name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements.txt

      - name: Build FAISS index
        working-directory: backend
        run: python scripts/build_faiss_index.py

      - name: Build TF-IDF index
        working-directory: backend
        run: python scripts/build_tfidf_index.py

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: ""
          GEMINI_API_KEY: ""
          SESSION_SECRET: "ci-secret"
        run: python -m pytest tests/ --ignore=tests/test_fridge.py -v

  frontend-tests:
    name: Frontend (TypeScript + Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm test
