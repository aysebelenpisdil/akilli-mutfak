repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-ast

  - repo: local
    hooks:
      - id: type-check-frontend
        name: TypeScript Check
        entry: bash -c 'npx tsc --noEmit'
        language: system
        pass_filenames: false
